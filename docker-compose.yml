services:
  postgres:
    image: postgres:16-alpine
    container_name: operator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: operator
      POSTGRES_DB: operator
    ports:
      # Uncommon host port to avoid clashing with other local Postgres instances.
      - "54499:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operator -d operator"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Second database for the Vitest suite; migrations run on test bootstrap.
  postgres-test:
    image: postgres:16-alpine
    container_name: operator-postgres-test
    profiles: ["test"]
    environment:
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: operator
      POSTGRES_DB: operator_test
    ports:
      - "54500:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operator -d operator_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
